name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS app (PyInstaller + portable zip)
        run: bash app/build_macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidanMgr-macos-portable
          path: app/dist/TidanMgr-macos-portable.zip
