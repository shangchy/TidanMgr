name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-macos:
    # macos-latest = Apple Silicon (arm64). Intel Macs need the intel job artifact.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            artifact-name: TidanMgr-macos-arm64
            portable-zip: TidanMgr-macos-arm64-portable.zip
          - runs-on: macos-15-intel
            artifact-name: TidanMgr-macos-intel
            portable-zip: TidanMgr-macos-intel-portable.zip

    runs-on: ${{ matrix.runs-on }}
    env:
      TIDANMGR_PORTABLE_ZIP: ${{ matrix.portable-zip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS app (PyInstaller + portable zip)
        run: bash app/build_macos.sh

      - name: Verify zip exists
        run: ls -lah "app/dist" && test -f "app/dist/${{ matrix.portable-zip }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: app/dist/${{ matrix.portable-zip }}
          if-no-files-found: error
